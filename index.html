<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impermeabilización y Recubrimientos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4d06f;
      color: #333;
    }
    header {
      background: #2f3e56;
      color: #f4d06f;
      padding: 40px 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 36px;
    }
    header p {
      margin-top: 10px;
      font-size: 18px;
    }
    .servicios {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      width: 280px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      text-align: center;
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card h3 {
      color: #e76f51;
      padding: 10px;
    }
    .contacto {
      background: #2f3e56;
      color: white;
      padding: 30px;
      text-align: center;
    }
    .contacto h2 {
      color: #f4d06f;
    }
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #e76f51;
      color: white;
      text-decoration: none;
      border-radius: 25px;
    }
    footer {
      background: #1b263b;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>Impermeabilización y Recubrimientos</h1>
  <p>Mantenimiento de azoteas y recubrimientos en pisos</p>
</header>

<section class="servicios">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" alt="Cubiertas">
    <h3>Cubiertas y Techos</h3>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789" alt="Epóxicos">
    <h3>Epóxicos y Poliuretanos</h3>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952" alt="Pintura">
    <h3>Pintura</h3>
  </div>
</section>

<section class="contacto">
  <h2>Contáctanos</h2>
  <p><strong>Monica Garcia</strong></p>
  <p>📞 (55) 3968-1437</p>
  <p>📍 CDMX y Área Metropolitana</p>
  <a class="btn" href="https://wa.me/525539681437" target="_blank">Enviar WhatsApp</a>

<footer>
  <p>Asesoría técnica incluida</p>
